<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="滴了个滴">
<meta name="theme-color" content="#F7F8F5">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>滴了个滴</title>
<style>
 :root {
 --primary: #CFEF6A;
 --primary-light: #D8F27A;
 --primary-glow: rgba(207,239,106,0.4);
 --accent: #FFF3A8;
 --accent-light: #FFE97D;
 --secondary: #EAF8E6;
 --bg: #F7F8F5;
 --surface: rgba(255,255,255,0.75);
 --surface-solid: #FFFFFF;
 --border: rgba(0,0,0,0.04);
 --text-primary: #2F3133;
 --text-secondary: #6B7280;
 --text-tertiary: #9CA3AF;
 --success: #10B981;
 --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
 --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
 --shadow-lg: 0 16px 48px rgba(0,0,0,0.08);
 --radius-sm: 6px;
 --radius-md: 12px;
 --radius-lg: 18px;
 --radius-xl: 24px;
 --radius-full: 9999px;
 --safe-area-top: 47px;
 --safe-area-bottom: 34px;
 }
 * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 html, body { height: 100%; overflow-x: hidden; }
 body {
 font-family: 'PingFang SC', -apple-system, sans-serif;
 background: var(--bg); color: var(--text-primary);
 min-height: 100vh; position: relative;
 }
 body::before {
 content: ''; position: fixed; top: -200px; left: -100px;
 width: 500px; height: 500px;
 background: radial-gradient(circle, rgba(207,239,106,0.15) 0%, transparent 60%);
 pointer-events: none; z-index: 0;
 }
 body::after {
 content: ''; position: fixed; bottom: -150px; right: -80px;
 width: 400px; height: 400px;
 background: radial-gradient(circle, rgba(255,243,168,0.12) 0%, transparent 60%);
 pointer-events: none; z-index: 0;
 }
 .app-wrap { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: calc(var(--safe-area-bottom) + 20px); }

 /* Header */
 .header { padding: var(--safe-area-top) 24px 20px; }
 .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
 .header-label { font-size: 14px; font-weight: 400; color: var(--text-secondary); letter-spacing: 0.02em; }
 .header-date-inline { font-size: 13px; font-weight: 400; color: var(--text-tertiary); }
 .header-title { font-size: 30px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.6px; margin-bottom: 4px; }
 .header-title-prefix { font-weight: 700; }
 .header-title-daily { font-weight: 600; }

 /* Today Card */
 .today-card {
 margin: 0 20px 16px; background: var(--surface);
 backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
 border-radius: var(--radius-xl); border: 1px solid var(--border);
 box-shadow: var(--shadow-md); overflow: hidden;
 animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
 }
 @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
 .today-header {
 padding: 18px 20px 14px; border-bottom: 1px solid rgba(0,0,0,0.05);
 display: flex; align-items: center; justify-content: space-between;
 }
 .today-header-left { display: flex; align-items: center; gap: 10px; }
 .today-dot {
 width: 6px; height: 6px; border-radius: 50%; background: var(--primary);
 box-shadow: 0 0 0 3px var(--primary-glow); animation: pulse 2.5s ease-in-out infinite;
 }
 @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px var(--primary-glow)} 50%{box-shadow:0 0 0 6px rgba(207,239,106,0.15)} }
 .today-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
 .today-duration {
 font-size: 12px; font-weight: 600; color: var(--text-secondary);
 background: var(--secondary); padding: 4px 10px; border-radius: var(--radius-full);
 font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif;
 }
 .today-times { display: grid; grid-template-columns: 1fr 1fr; }
 .time-cell { padding: 16px 20px 14px; position: relative; }
 .time-cell:first-child { border-right: 1px solid rgba(0,0,0,0.05); }
 .time-cell-label {
 font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
 color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 6px;
 display: flex; align-items: center; gap: 5px;
 }
 .time-cell-label-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); }
 .time-cell-label-dot.out { background: var(--accent-light); }
 .time-cell-value {
 font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-primary);
 cursor: pointer; transition: all 0.2s; display: inline-block; vertical-align: bottom;
 font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif;
 }
 .time-cell-value:hover { opacity: 0.7; }
 .time-cell-value.empty { font-size: 24px; font-weight: 400; color: var(--text-tertiary); letter-spacing: -0.5px; }
 .time-edit-hint { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; opacity: 0; transition: opacity 0.2s; }
 .time-cell:hover .time-edit-hint { opacity: 1; }
 .progress-wrap { padding: 0 20px 18px; }
 .progress-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
 .progress-meta-text { font-size: 12px; color: var(--text-secondary); }
 .progress-meta-std { font-size: 12px; font-weight: 600; color: var(--text-tertiary); font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; }
 .progress-track { width: 100%; height: 5px; background: var(--secondary); border-radius: var(--radius-full); overflow: hidden; }
 .progress-fill {
 height: 100%; border-radius: var(--radius-full);
 background: rgba(207,239,106,0.6);
 transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
 }
 .progress-fill.over { background: rgba(207,239,106,0.8); }
 .warn-banner {
 margin: 0 20px 14px; background: rgba(96,165,250,0.08);
 border-radius: var(--radius-md); padding: 10px 14px;
 display: none; align-items: center; gap: 6px; animation: fadeIn 0.3s ease;
 }
 .warn-banner.show { display: flex; }
 @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
 .warn-icon { width: 16px; height: 16px; flex-shrink: 0; background: #60A5FA; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 700; }
 .warn-text { font-size: 12px; color: #3B82F6; font-weight: 500; }

 /* Buttons */
 .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 0 20px 16px; animation: slideUp 0.5s 0.08s both; }
 .clock-btn {
 border: none; outline: none; cursor: pointer; border-radius: var(--radius-xl);
 padding: 0; overflow: hidden; position: relative; height: 100px;
 transition: transform 0.2s cubic-bezier(0.22,1,0.36,1); -webkit-user-select: none; user-select: none;
 }
 .clock-btn-inner { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; position: relative; z-index: 1; }
 .btn-in {
 background: linear-gradient(145deg, var(--primary), #C2E865, #D8F27A);
 box-shadow: 0 12px 40px var(--primary-glow), 0 4px 12px rgba(207,239,106,0.25);
 }
 .btn-out {
 background: linear-gradient(145deg, #FDE68A, var(--accent-light), #FCD34D);
 box-shadow: 0 12px 40px rgba(255,243,168,0.40), 0 4px 12px rgba(255,243,168,0.25);
 }
 .clock-btn:active { transform: scale(0.96); }
 .btn-icon { font-size: 30px; line-height: 1; }
 .btn-label { font-size: 20px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.2px; font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; }

 /* Stats */
 .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 20px 16px; animation: slideUp 0.5s 0.15s both; }
 .stat-card {
 background: var(--surface); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
 border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
 padding: 14px 16px; opacity: 0.9; transition: all 0.3s;
 }
 .stat-card:hover { opacity: 1; }
 .stat-card-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.05em; margin-bottom: 4px; }
 .stat-card-value { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; }
 .stat-card-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
 .stat-tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; border-radius: 6px; padding: 3px 7px; margin-top: 6px; }
 .stat-tag.warn { background: #F3F4F6; color: #6B7280; }
 .stat-tag.ok { background: var(--primary-glow); color: #4D7C0F; }

 /* Calendar */
 .calendar-section {
 margin: 0 20px 16px; background: var(--surface);
 backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
 border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
 padding: 16px; animation: slideUp 0.5s 0.2s both;
 }
 .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
 .calendar-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
 .calendar-nav { display: flex; gap: 10px; }
 .calendar-nav button {
 width: 36px; height: 36px; border: none; background: rgba(0,0,0,0.06); border-radius: 10px;
 cursor: pointer; color: var(--text-secondary); transition: background 0.2s;
 display: flex; align-items: center; justify-content: center;
 }
 .calendar-nav button:hover { background: rgba(0,0,0,0.1); }
 .calendar-weekdays { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 8px; }
 .calendar-weekdays > div { text-align: center; font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
 .calendar-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
 .calendar-day {
 min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center;
 border-radius: 10px; font-size: 14px; cursor: pointer; transition: all 0.15s; position: relative; padding: 4px 0;
 }
 .calendar-day:hover { background: rgba(0,0,0,0.04); }
 .calendar-day.other-month { color: var(--text-tertiary); opacity: 0.5; }
 .calendar-day.today { background: var(--primary-glow); font-weight: 700; }
 .calendar-day .day-num { color: var(--text-primary); font-weight: 500; font-size: 14px; }
 .calendar-day.today .day-num { font-weight: 700; }
 .calendar-day .day-lunar { font-size: 9px; color: var(--text-tertiary); margin-top: 1px; }
 .calendar-day .day-holiday { font-size: 8px; color: #fff; font-weight: 600; background: #60A5FA; padding: 1px 4px; border-radius: 3px; margin-top: 1px; }
 .calendar-day.has-record .day-num::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }
 .calendar-day.today.has-record .day-num::after { display: none; }

 /* History */
 .section-header { padding: 4px 20px 10px; display: flex; align-items: center; justify-content: space-between; animation: slideUp 0.5s 0.22s both; }
 .section-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
 .history-wrap { margin: 0 20px; animation: slideUp 0.5s 0.28s both; }
 .week-group { margin-bottom: 18px; }
 .week-group.collapsed .day-list { display: none; }
 .week-group.collapsed .week-header { border-bottom: none; }
 .expand-btn { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 0; padding: 12px 0; font-size: 13px; font-weight: 500; color: var(--text-secondary); background: none; border: none; cursor: pointer; width: 100%; transition: color 0.2s; }
 .expand-btn:hover { color: var(--text-primary); }
 .expand-btn svg { width: 14px; height: 14px; stroke: var(--text-secondary); transition: transform 0.3s; }
 .expand-btn.expanded svg { transform: rotate(180deg); }
 .week-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed rgba(0,0,0,0.05); }
 .week-info { display: flex; align-items: center; gap: 8px; }
 .week-tag { font-size: 10px; font-weight: 700; color: var(--text-primary); background: var(--primary); padding: 3px 8px; border-radius: 6px; }
 .week-range { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
 .week-avg { display: flex; align-items: center; gap: 6px; }
 .week-avg-val { font-size: 13px; font-weight: 700; color: var(--text-primary); font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; }
 .week-gap { font-size: 13px; font-weight: 400; color: #6B7280; font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; }
 .week-gap.ok { color: #4D7C0F; }
 .day-list { display: flex; flex-direction: column; }
 .day-item { padding: 12px 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px dashed rgba(0,0,0,0.05); position: relative; }
 .day-item:last-child { border-bottom: none; }
 .day-item:first-child { border-top: 1px dashed rgba(0,0,0,0.05); }
 .day-item.incomplete { background: rgba(207,239,106,0.08); }
 .day-left { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
 .day-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
 .day-date { font-size: 11px; color: var(--text-tertiary); }
 .day-center { display: flex; align-items: center; gap: 6px; }
 .day-time { font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; padding: 3px 6px; border-radius: 6px; transition: all 0.2s; font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; }
 .day-time:hover { background: var(--secondary); color: var(--text-primary); }
 .day-arrow { font-size: 10px; color: var(--text-tertiary); }
 .day-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
 .day-hours { font-size: 14px; font-weight: 700; color: var(--text-primary); font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; }
 .day-del-btn { position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; border-radius: 50%; background: #EF4444; border: none; color: #fff; font-size: 11px; font-weight: 700; display: none; align-items: center; justify-content: center; cursor: pointer; }
 .day-item:hover .day-del-btn { display: flex; }
 .empty-history { text-align: center; padding: 36px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
 .empty-icon { width: 44px; height: 44px; margin: 0 auto 10px; background: var(--secondary); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
 .empty-icon svg { width: 22px; height: 22px; stroke: var(--primary); fill: none; stroke-width: 2; }
 .empty-text { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
 .empty-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

 /* Modals */
 .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.35); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; }
 .modal-overlay.show { display: flex; }
 .modal-sheet {
 width: 100%; max-width: 430px; background: rgba(252,252,254,0.98);
 backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%);
 border-radius: 24px 24px 0 0; padding: 10px 24px calc(var(--safe-area-bottom) + 30px);
 animation: sheetUp 0.35s cubic-bezier(0.22,1,0.36,1);
 }
 @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
 .modal-handle { width: 36px; height: 4px; background: rgba(0,0,0,0.12); border-radius: 2px; margin: 0 auto 16px; }
 .modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; text-align: center; }
 .time-picker-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
 .time-picker-input {
 font-size: 44px; font-weight: 700; letter-spacing: -2px; color: var(--text-primary);
 background: var(--surface); border: 2px solid rgba(207,239,106,0.3); border-radius: 14px;
 width: 100px; text-align: center; outline: none; padding: 10px;
 font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; -moz-appearance: textfield;
 }
 .time-picker-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
 .time-picker-input::-webkit-inner-spin-button, .time-picker-input::-webkit-outer-spin-button { -webkit-appearance: none; }
 .time-colon { font-size: 44px; font-weight: 700; color: var(--text-primary); line-height: 1; animation: blink 1.2s step-end infinite; font-family: 'SF Pro Display','SF Pro',-apple-system,'Helvetica Neue',sans-serif; }
 @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
 .modal-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
 .modal-btn { border: none; outline: none; cursor: pointer; padding: 14px; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; transition: all 0.15s; font-family: 'PingFang SC',-apple-system,sans-serif; }
 .modal-btn:active { transform: scale(0.97); }
 .modal-btn-cancel { background: rgba(0,0,0,0.05); color: var(--text-primary); }
 .modal-btn-save { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: var(--text-primary); box-shadow: 0 6px 20px var(--primary-glow); }
 .modal-btn-delete { background: rgba(239,68,68,0.08); color: #EF4444; }

 /* Toast */
 .toast {
 position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.9);
 background: var(--text-primary); color: #fff; padding: 12px 24px; border-radius: 14px;
 font-size: 15px; font-weight: 500; z-index: 200; opacity: 0; pointer-events: none;
 transition: all 0.3s cubic-bezier(0.22,1,0.36,1); text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
 }
 .toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

 /* Alert Bubble */
 .alert-bubble {
 position: fixed; top: calc(var(--safe-area-top) + 10px); right: 16px; max-width: 260px;
 background: linear-gradient(135deg, #FCE7F3, #FBCFE8); border-radius: 14px; padding: 12px 14px;
 box-shadow: 0 8px 30px rgba(236,72,153,0.2); z-index: 150; opacity: 0;
 transform: translateX(20px) scale(0.9); pointer-events: none; transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
 }
 .alert-bubble.show { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; }
 .alert-bubble::before { content: ''; position: absolute; right: 16px; top: -6px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 6px solid #FBCFE8; }
 .alert-bubble-title { font-size: 12px; font-weight: 700; color: #BE185D; margin-bottom: 4px; }
 .alert-bubble-text { font-size: 11px; color: #9D174D; line-height: 1.4; }
 .alert-bubble-close { position: absolute; top: 6px; right: 8px; background: none; border: none; font-size: 14px; color: #BE185D; cursor: pointer; padding: 4px; }
 ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="app-wrap">
 <div class="header">
 <div class="header-top">
 <div class="header-label">滴了个滴</div>
 <div class="header-date-inline" id="headerDate"></div>
 </div>
 <div class="header-title" id="headerTitle"></div>
 </div>
 <div class="today-card">
 <div class="today-header">
 <div class="today-header-left"><div class="today-dot"></div><div class="today-label">今日打卡</div></div>
 <div class="today-duration" id="todayDuration">-- h</div>
 </div>
 <div class="today-times">
 <div class="time-cell">
 <div class="time-cell-label"><div class="time-cell-label-dot"></div>上班</div>
 <div class="time-cell-value empty" id="todayIn" onclick="openEditModal('today','in')">未打卡</div>
 <div class="time-edit-hint">点击修改</div>
 </div>
 <div class="time-cell">
 <div class="time-cell-label"><div class="time-cell-label-dot out"></div>下班</div>
 <div class="time-cell-value empty" id="todayOut" onclick="openEditModal('today','out')">未打卡</div>
 <div class="time-edit-hint">点击修改</div>
 </div>
 </div>
 <div class="progress-wrap">
 <div class="progress-meta">
 <div class="progress-meta-text" id="progressText">已工作 0.0h</div>
 <div class="progress-meta-std" id="progressStd">/ 11.5h</div>
 </div>
 <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
 </div>
 <div class="warn-banner" id="todayWarnBanner">
 <div class="warn-icon">!</div>
 <div class="warn-text" id="todayWarnText"></div>
 </div>
 </div>
 <div class="btn-row">
 <button class="clock-btn btn-in" onclick="clockIn()"><div class="clock-btn-inner"><div class="btn-icon">💻</div><div class="btn-label">Start Work</div></div></button>
 <button class="clock-btn btn-out" onclick="clockOut()"><div class="clock-btn-inner"><div class="btn-icon">🌙</div><div class="btn-label">Clock Out</div></div></button>
 </div>
 <div class="stats-row">
 <div class="stat-card"><div class="stat-card-label">本周平均</div><div class="stat-card-value" id="weekAvg">-- h</div><div class="stat-card-sub" id="weekDays">暂无数据</div><div id="weekTag"></div></div>

<script>
// PWA standalone mode: auto SSO redirect if not authenticated
(function() {
 const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
 if (isStandalone) {
  // Verify auth by making a lightweight HEAD request to the same origin
  fetch(window.location.origin + window.location.pathname, { method: 'HEAD', redirect: 'manual' })
   .then(function(resp) {
    // If server returns a redirect (302/301), it's likely SSO redirect
    if (resp.type === 'opaqueredirect' || resp.status === 302 || resp.status === 301) {
     // Need to authenticate — open SSO login with service URL pointing back to our app
     const ssoUrl = 'https://sso.corp.kuaishou.com/cas/login?service=' + encodeURIComponent(window.location.origin + window.location.pathname);
     window.location.replace(ssoUrl);
    }
   })
   .catch(function() {
    // Network error in standalone mode — try SSO explicitly
    const ssoUrl = 'https://sso.corp.kuaishou.com/cas/login?service=' + encodeURIComponent(window.location.origin + window.location.pathname);
    window.location.replace(ssoUrl);
   });
 }
})();

const lunarData = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
 '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
 '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
const monthLunar = ['','正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
function getLunarDate(y,m,d) { const base=new Date(1900,0,31); const t=new Date(y,m-1,d); const diff=Math.floor((t-base)/(24*60*60*1000)); return {day:lunarData[diff%30],month:monthLunar[Math.floor(diff/30)%12+1]}; }
function getTodayKey() { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
function getStdHours() { return parseFloat(localStorage.getItem('wc_std_hours'))||DEFAULT_STD_HOURS; }
function loadRecords() { try{return JSON.parse(localStorage.getItem('wc_records')||'{}')}catch{return{}} }
function saveRecords(r) { localStorage.setItem('wc_records',JSON.stringify(r)); }
function fmtTime(h,m) { return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }
function parseHM(t) { return t.split(':').map(Number); }
function diffHours(inT,outT) { const a=parseHM(inT),b=parseHM(outT); let bm=b[0]*60+b[1]; if(b[0]>=0&&b[0]<6&&b[0]*60+b[1]<a[0]*60+a[1]) bm+=24*60; return Math.max(0,(bm-a[0]*60-a[1])/60); }
function getDailyMessage() { const d=parseInt(getTodayKey().replace(/-/g,'')); return dailyMessages[d%dailyMessages.length]; }
function getWeekKey(ds) { const d=new Date(ds); const day=d.getDay()||7; const m=new Date(d); m.setDate(d.getDate()-day+1); return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`; }
function getWeekRange(wk) { const m=new Date(wk); const s=new Date(m); s.setDate(m.getDate()+6); return `${m.getMonth()+1}/${m.getDate()} - ${s.getMonth()+1}/${s.getDate()}`; }
function getWeekNumber(ds) { const d=new Date(ds); const s=new Date(d.getFullYear(),0,1); return Math.ceil((d-s+(s.getDay()===0?1:(8-s.getDay()))*86400000)/(7*86400000)); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function showAlertBubble(h) { const b=document.getElementById('alertBubble'); const t=document.getElementById('alertBubbleText'); const S=getStdHours(); t.innerHTML=`您上周平均工时 <strong>${h.toFixed(1)}h</strong>，未达到 ${S}h 标准，还差 <strong>${(S-h).toFixed(1)}h</strong>`; b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),8000); }
function closeAlertBubble() { document.getElementById('alertBubble').classList.remove('show'); }
function checkLastWeekAlert() { const r=loadRecords(),S=getStdHours(),today=new Date(); const td=today.getDay()||7; const mon=new Date(today); mon.setDate(today.getDate()-td+1); const lm=new Date(mon); lm.setDate(mon.getDate()-7); const ls=new Date(lm); ls.setDate(lm.getDate()+6); const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; let wd=[]; Object.keys(r).forEach(k=>{if(k>=fmt(lm)&&k<=fmt(ls)&&r[k].in&&r[k].out) wd.push(diffHours(r[k].in,r[k].out))}); if(wd.length>0){const avg=wd.reduce((a,b)=>a+b,0)/wd.length; if(avg<S) showAlertBubble(avg);} }
let editCtx=null, currentCalMonth=new Date().getMonth()+1, currentCalYear=new Date().getFullYear();
function renderCalendar() { const r=loadRecords(); document.getElementById('calendarTitle').textContent=`${currentCalYear}年${currentCalMonth}月`; const fd=new Date(currentCalYear,currentCalMonth-1,1).getDay(); const dm=new Date(currentCalYear,currentCalMonth,0).getDate(); const tk=getTodayKey(); let h=''; const pm=new Date(currentCalYear,currentCalMonth-1,0).getDate(); for(let i=fd-1;i>=0;i--) h+=`<div class="calendar-day other-month"><span class="day-num">${pm-i}</span></div>`; for(let d=1;d<=dm;d++){const k=`${currentCalYear}-${String(currentCalMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const hr=r[k]&&(r[k].in||r[k].out);const it=k===tk;const lu=getLunarDate(currentCalYear,currentCalMonth,d);const hol=holidays[k];const hl=hol?`<span class="day-holiday">${hol}</span>`:'';const ll=lu.day==='初一'?lu.month:(hol?'':lu.day);h+=`<div class="calendar-day ${it?'today':''} ${hr?'has-record':''}" onclick="openEditModal('${k}','in')"><span class="day-num">${d}</span>${hl}${ll?`<span class="day-lunar">${ll}</span>`:''}</div>`;} const tc=Math.ceil((fd+dm)/7)*7;const rem=tc-(fd+dm); for(let d=1;d<=rem;d++) h+=`<div class="calendar-day other-month"><span class="day-num">${d}</span></div>`; document.getElementById('calendarDays').innerHTML=h; }
function changeMonth(d) { currentCalMonth+=d; if(currentCalMonth>12){currentCalMonth=1;currentCalYear++} if(currentCalMonth<1){currentCalMonth=12;currentCalYear--} renderCalendar(); }
function openEditModal(dk,t) { editCtx={dayKey:dk,type:t}; const r=loadRecords(); const rec=r[dk==='today'?getTodayKey():dk]||{}; const ts=t==='in'?rec.in:rec.out; document.getElementById('modalTitle').textContent=t==='in'?'修改上班时间':'修改下班时间'; if(ts){const[h,m]=parseHM(ts); document.getElementById('pickerHour').value=h; document.getElementById('pickerMin').value=m;}else{const n=new Date(); document.getElementById('pickerHour').value=n.getHours(); document.getElementById('pickerMin').value=n.getMinutes();} document.getElementById('modalOverlay').classList.add('show'); setTimeout(()=>document.getElementById('pickerHour').focus(),200); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); editCtx=null; }
function onOverlayClick(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }
function saveModal() { if(!editCtx)return; let h=parseInt(document.getElementById('pickerHour').value),m=parseInt(document.getElementById('pickerMin').value); if(isNaN(h)||isNaN(m))return; h=Math.min(23,Math.max(0,h)); m=Math.min(59,Math.max(0,m)); const r=loadRecords(); const k=editCtx.dayKey==='today'?getTodayKey():editCtx.dayKey; if(!r[k])r[k]={}; r[k][editCtx.type]=fmtTime(h,m); saveRecords(r); closeModal(); render(); renderCalendar(); showToast('时间已更新'); }
function deleteModalRecord() { if(!editCtx)return; const r=loadRecords(); const k=editCtx.dayKey==='today'?getTodayKey():editCtx.dayKey; if(!r[k]){closeModal();return;} delete r[k][editCtx.type]; if(!r[k].in&&!r[k].out) delete r[k]; saveRecords(r); closeModal(); render(); renderCalendar(); showToast('记录已删除'); }
function clockIn() { const n=new Date(),r=loadRecords(),k=getTodayKey(); if(!r[k])r[k]={}; r[k].in=fmtTime(n.getHours(),n.getMinutes()); saveRecords(r); showToast('上班打卡成功 ✓'); render(); }
function clockOut() { const n=new Date(),r=loadRecords(),k=getTodayKey(); if(!r[k])r[k]={}; r[k].out=fmtTime(n.getHours(),n.getMinutes()); saveRecords(r); showEncouragement(); render(); }
function showEncouragement() { const ms=['辛苦啦！现在回家休息啦～','下班快乐！今天的你很棒！','忙完啦！好好享受夜晚时光','打卡成功！辛苦了一天','下班啦！回家路上注意安全','今天辛苦了！好好犒劳自己','工作完成！享受自由时间','辛苦啦！早点休息','下班成功！一天的忙碌值得','今日工时已记录，好好放松']; const d=parseInt(getTodayKey().replace(/-/g,'')); showToast(ms[d%ms.length]+' ✨'); }
function render() {
 const r=loadRecords(),tk=getTodayKey(),today=r[tk]||{},now=new Date(),S=getStdHours();
 document.getElementById('headerDate').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${DAYS_CN[now.getDay()]}`;
 document.getElementById('headerTitle').innerHTML=`<span class="header-title-prefix">🔖 Dudu,</span> <span class="header-title-daily">${getDailyMessage()}</span>`;
 document.getElementById('progressStd').textContent=`/ ${S}h`;
 const inEl=document.getElementById('todayIn'),outEl=document.getElementById('todayOut');
 if(today.in){inEl.textContent=today.in;inEl.classList.remove('empty')}else{inEl.textContent='未打卡';inEl.classList.add('empty')}
 if(today.out){outEl.textContent=today.out;outEl.classList.remove('empty')}else{outEl.textContent='未打卡';outEl.classList.add('empty')}
 let th=0; if(today.in&&today.out) th=diffHours(today.in,today.out);
 document.getElementById('todayDuration').textContent=(today.in&&today.out)?th.toFixed(1)+'h':'-- h';
 const pct=Math.min(100,th/S*100); const fill=document.getElementById('progressFill');
 fill.style.width=pct+'%'; fill.className='progress-fill'+(th>=S?' over':'');
 document.getElementById('progressText').textContent=(today.in&&today.out)?`已工作 ${th.toFixed(1)}h`:'已工作 0.0h';
 const wb=document.getElementById('todayWarnBanner');
 if(today.in&&today.out&&th<S){wb.classList.add('show');document.getElementById('todayWarnText').textContent=`今日工时未达标，还差 ${(S-th).toFixed(1)} 小时`}else wb.classList.remove('show');
 const thisWK=getWeekKey(tk),thisM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
 let wd=[],md=[]; Object.keys(r).forEach(k=>{if(r[k].in&&r[k].out){const h=diffHours(r[k].in,r[k].out);if(getWeekKey(k)===thisWK)wd.push(h);if(k.startsWith(thisM))md.push(h)}});
 function rs(avgEl,daysEl,tagEl,days){if(!days.length){avgEl.textContent='-- h';daysEl.textContent='暂无数据';tagEl.innerHTML='';return;}const avg=days.reduce((a,b)=>a+b,0)/days.length;avgEl.textContent=avg.toFixed(1)+'h';daysEl.textContent=`共 ${days.length} 天`;if(avg<S) tagEl.innerHTML=`<div class="stat-tag warn">差 ${(S-avg).toFixed(1)}H</div>`;else tagEl.innerHTML=`<div class="stat-tag ok">达标 ✓</div>`;}
 rs(document.getElementById('weekAvg'),document.getElementById('weekDays'),document.getElementById('weekTag'),wd);
 rs(document.getElementById('monthAvg'),document.getElementById('monthDays'),document.getElementById('monthTag'),md);
 const hw=document.getElementById('historyWrap'); const sk=Object.keys(r).sort((a,b)=>b.localeCompare(a));
 // Generate all dates for recent weeks instead of only dates with records
 const today=new Date(); const todayKey=getTodayKey();
 // Go back up to 90 days to cover records, plus fill forward for current week
 const allDates=[];
 const startDate=new Date(today); startDate.setDate(today.getDate()-90);
 const endDate=new Date(today);
 // Extend end to this Sunday
 const todayDay=today.getDay()||7; const thisSunday=new Date(today); thisSunday.setDate(today.getDate()+(7-todayDay));
 // Build date list
 for(let d=new Date(startDate); d<=thisSunday; d.setDate(d.getDate()+1)){
 const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
 allDates.push(k);
 }
 const wm={}; allDates.forEach(k=>{const w=getWeekKey(k);if(!wm[w])wm[w]=[];wm[w].push(k)});
 const wk=Object.keys(wm).sort((a,b)=>b.localeCompare(a)); let html='';
 wk.forEach((w,idx)=>{
 const ds=wm[w],cd=ds.filter(k=>r[k]&&r[k].in&&r[k].out),wh=cd.map(k=>diffHours(r[k].in,r[k].out));
 const wa=wh.length?wh.reduce((a,b)=>a+b,0)/wh.length:null;const wn=getWeekNumber(w);
 let ws=''; if(wa!==null){const d=S-wa;ws=d>0?`<div class="week-gap">差 ${d.toFixed(1)}H</div>`:`<div class="week-gap ok">达标</div>`;}
 const collapsed=idx>0&&wk.length>1;
 const hasAnyRecord=ds.some(k=>r[k]&&(r[k].in||r[k].out));
 // Only show weeks that have at least one record OR are current week
 const isCurrentWeek=getWeekKey(todayKey)===w;
 if(!hasAnyRecord&&!isCurrentWeek) return;
 html+=`<div class="week-group${collapsed?' collapsed':''}" data-week="${w}"><div class="week-header"><div class="week-info"><div class="week-tag">第${wn}周</div><div class="week-range">${getWeekRange(w)}</div></div><div class="week-avg">${wa!==null?`<div class="week-avg-val">均 ${wa.toFixed(1)}H</div>`:'<div class="week-avg-val">--</div>'}${ws}</div></div><div class="day-list">`;
 ds.forEach(k=>{
 const rc=r[k]||{};const d=new Date(k);const dn=DAYS_CN[d.getDay()],dl=`${d.getMonth()+1}月${d.getDate()}日`;const hc=rc.in&&rc.out,hrs=hc?diffHours(rc.in,rc.out):null,ok=hrs!==null&&hrs>=S;
 const isFuture=k>todayKey;
 const itemCls=hc?(ok?'ok':'incomplete'):(!isFuture?'':'');
 const inTime=rc.in||'--:--'; const outTime=rc.out||'--:--';
 html+=`<div class="day-item ${itemCls}"><div class="day-left"><div class="day-name">${dn}</div><div class="day-date">${dl}</div></div><div class="day-center"><div class="day-time" onclick="openEditModal('${k}','in')">${inTime}</div><div class="day-arrow">→</div><div class="day-time" onclick="openEditModal('${k}','out')">${outTime}</div></div><div class="day-right"><div class="day-hours">${hrs!==null?hrs.toFixed(1)+'h':'--'}</div></div><button class="day-del-btn" onclick="deleteDay('${k}')">×</button></div>`;
 }); html+=`</div></div>`;
 });
 if(wk.length>1) html+=`<button class="expand-btn" id="expandBtn" onclick="expandHistory()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg> 展开更早记录（${wk.length-1}周）</button>`;
 hw.innerHTML=html;
}
function deleteDay(key) { if(!confirm('确定删除该天记录？'))return; const r=loadRecords(); delete r[key]; saveRecords(r); render(); showToast('记录已删除'); }
function expandHistory() { document.querySelectorAll('.week-group.collapsed').forEach(g=>g.classList.remove('collapsed')); const b=document.getElementById('expandBtn'); if(b){b.classList.add('expanded');b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg> 收起`;b.onclick=collapseHistory;}}
function collapseHistory() { document.querySelectorAll('.week-group').forEach((g,i)=>{if(i>0)g.classList.add('collapsed')}); const b=document.getElementById('expandBtn'); if(b){const n=document.querySelectorAll('.week-group.collapsed').length;b.classList.remove('expanded');b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg> 展开更早记录（${n}周）`;b.onclick=expandHistory;}}
setInterval(()=>{const r=loadRecords(),rc=r[getTodayKey()]||{};if(rc.in&&!rc.out){const n=new Date();const[h,m]=parseHM(rc.in);const e=(n.getHours()*60+n.getMinutes()-h*60-m)/60;const S=getStdHours();document.getElementById('todayDuration').textContent=e>0?e.toFixed(1)+'h':'-- h';document.getElementById('progressFill').style.width=Math.min(100,e/S*100)+'%';document.getElementById('progressText').textContent=`已工作 ${Math.max(0,e).toFixed(1)}h`;}},30000);
render(); renderCalendar(); checkLastWeekAlert();
</script>
